name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: |
          mkdir dist
          cp target/release/tool-issuance.exe dist/
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: tool-issuance-windows
          path: dist/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: |
          mkdir dist
          cp target/release/tool-issuance dist/
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: tool-issuance-linux
          path: dist/

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: tool-issuance-windows
          path: windows/
      - uses: actions/download-artifact@v4
        with:
          name: tool-issuance-linux
          path: linux/
      - run: |
          cd windows && zip -r ../tool-issuance-windows.zip . && cd ..
          cd linux && zip -r ../tool-issuance-linux.zip . && cd ..
      - uses: softprops/action-gh-release@v1
        with:
          files: |
            tool-issuance-windows.zip
            tool-issuance-linux.zip
