name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Create distribution
        run: |
          mkdir dist
          cp target/release/tool-issuance.exe dist/
          mkdir dist/data

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tool-issuance-windows
          path: dist/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Create distribution
        run: |
          mkdir dist
          cp target/release/tool-issuance dist/
          mkdir dist/data

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tool-issuance-linux
          path: dist/

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: tool-issuance-windows
          path: windows/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: tool-issuance-linux
          path: linux/

      - name: Create archives
        run: |
          cd windows && zip -r ../tool-issuance-windows.zip . && cd ..
          cd linux && zip -r ../tool-issuance-linux.zip . && cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            tool-issuance-windows.zip
            tool-issuance-linux.zip
